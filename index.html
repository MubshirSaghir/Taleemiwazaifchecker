<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taleemi Wazaif Checker</title>
    <meta name="description" content="Check eligibility for Taleemi Wazaif program">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" id="taleemi-wrapper" dir="ltr">
        <div class="card">
            <div class="header">
                <h2><span class="icon">🎓</span> <span id="app-title">Taleemi Wazaif Checker</span></h2>
            </div>
            
            <div class="language-toggle">
                <button id="lang-btn" class="lang-btn" onclick="toggleLanguage()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="globe-icon" style="color: #0284c7;">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                    <span id="lang-text">اردو / English</span>
                </button>
            </div>

            <div class="form-container">
                <div class="form-group">
                    <input type="number" id="age" min="1" max="50" placeholder="Enter your age (e.g. 19)" class="input-field" aria-label="Age">
                </div>

                <div class="form-group">
                    <select id="class-level" class="input-field select-field" aria-label="Class Level">
                        <!-- Options generated by JS -->
                    </select>
                </div>

                <button id="check-btn" class="primary-btn" onclick="handleCheck()">
                    Check Eligibility
                </button>
                
                <button id="reset-btn" class="secondary-btn" onclick="handleReset()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" class="reset-icon">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.34-9.37l5.63 5.4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg> 
                    <span id="reset-text">Reset</span>
                </button>

                <div id="result-container" class="result-container hidden">
                    <div id="result-icon"></div>
                    <span id="result-msg"></span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
